user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    # Rate limiting zones
    limit_conn_zone $binary_remote_addr zone=addr:10m;
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=static:10m rate=50r/s;
    limit_req_zone $binary_remote_addr zone=images:10m rate=30r/s;

    # User-Agent blacklist
    map $http_user_agent $blocked_ua {
        default 0;
        ~*(scrapy|curl|wget|python-requests|httpx|aiohttp|bot|crawler|spider) 1;
        ~*(HeadlessChrome|PhantomJS|Selenium|Playwright|Puppeteer) 2;
    }

    upstream backend {
        server backend:8000;
    }

    server {
        listen 80;
        server_name localhost;
        client_max_body_size 20M;

        # Block bad UAs
        if ($blocked_ua = 1) {
            return 403 "Forbidden";
        }

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Static files
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # API requests
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            limit_conn addr 20;

            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # Uploads with stricter rate limiting
        location /uploads/ {
            limit_req zone=images burst=50 nodelay;
            alias /var/www/uploads/;
            expires 1d;
            add_header Cache-Control "public, immutable";
        }
    }
}
